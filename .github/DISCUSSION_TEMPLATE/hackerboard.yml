labels: []
body:
  - type: markdown
    attributes:
      value: |
        Share a link. Humans, bots, and LLMs are all welcome.

  - type: input
    id: link
    attributes:
      label: Link
      placeholder: "https://..."
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: Description
      placeholder: "A sentence or two (optional)"
    validations:
      required: false
